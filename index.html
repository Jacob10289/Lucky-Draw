<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Rút Thăm Trúng Thưởng - Spotify 3 Tháng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>

    <div class="main-container">
        <header class="header">
            <div class="logo">🎯</div>
            <h1 class="title">Rút Thăm Trúng Thưởng</h1>
            <p class="subtitle">Giải thưởng: <span class="prize-highlight">Spotify Premium 3 Tháng</span></p>
        </header>

        <!-- Connection status -->
        <div class="connection-status" id="connStatus">
            <span class="conn-dot"></span> Đang kết nối server...
        </div>

        <!-- Login -->
        <section class="card login-card" id="loginSection">
            <div class="card-icon">✨</div>
            <h2>Nhập thông tin để tham gia</h2>
            <div class="input-group">
                <label for="fullName">Họ và tên đầy đủ</label>
                <input type="text" id="fullName" placeholder="Ví dụ: Nguyễn Văn A" autocomplete="off">
            </div>
            <button class="btn btn-primary btn-glow" id="loginBtn">
                <span>🚀 Bắt đầu rút thăm</span>
            </button>
        </section>

        <!-- User Dashboard -->
        <section class="card dashboard-card hidden" id="userSection">
            <div class="user-info">
                <div class="avatar">👤</div>
                <div class="user-details">
                    <h3 id="displayName">Tên người chơi</h3>
                    <span class="badge user-badge">Người chơi</span>
                </div>
            </div>
            <div class="draw-section">
                <div class="gift-box" id="giftBox">
                    <div class="gift-lid"></div>
                    <div class="gift-body">🎁</div>
                    <div class="gift-ribbon"></div>
                </div>
                <button class="btn btn-draw btn-pulse" id="drawBtn">
                    <span>🎲 Rút Thăm Ngay</span>
                </button>
                <p class="draw-hint">Nhấn nút để thử vận may của bạn!</p>
            </div>
            <button class="btn btn-logout" id="logoutBtn">↩ Đăng xuất</button>
        </section>
    </div>

    <!-- Result Modal -->
    <div class="modal hidden" id="resultModal">
        <div class="modal-content">
            <div class="modal-bg"></div>
            <div class="modal-body">
                <div class="result-icon" id="resultIcon">🎊</div>
                <h2 id="resultTitle">Chúc mừng!</h2>
                <p id="resultMessage">Bạn đã trúng thưởng!</p>
                <div class="prize-display hidden" id="prizeDisplay">
                    <div class="prize-card">
                        <div class="prize-icon">🎵</div>
                        <div class="prize-name">Spotify Premium</div>
                        <div class="prize-duration">3 Tháng</div>
                    </div>
                    <a id="prizeLink" href="#" target="_blank" class="btn btn-primary btn-glow">
                        🎁 Nhận quà ngay
                    </a>
                </div>
                <button class="btn btn-secondary" id="closeModalBtn">Đóng</button>
            </div>
        </div>
    </div>

    <canvas id="confettiCanvas"></canvas>

    <script type="module" src="script.js"></script>
</body>
</html>
